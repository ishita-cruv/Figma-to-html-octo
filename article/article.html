<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHeartVIP - article</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.5;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            margin-left: 0;
        }

        /* Header */
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 0 0 auto;
        }

        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            color: #1a1a1a;
            align-items: center;
            justify-content: center;
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 150;
        }

        .sidebar-backdrop.visible {
            display: block;
        }

        .header-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .logo {
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            color: #1a1a1a;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            height: 18px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .header-title-image {
            height: 24px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0px;
            white-space: nowrap;
            color: #1a1a1a;
            height: 31px;
            display: flex;
            align-items: center;
        }

        .header-title .subtle {
            font-weight: 400;
            color: #666;
        }

        .search-container {
            display: flex;
            align-items: center;
            background-color: #f5f5f5;
            border-radius: 20px;
            padding: 8px 14px;
            gap: 8px;
            min-width: 320px;
        }

        .search-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .search-container input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 13px;
            outline: none;
            color: #1a1a1a;
        }

        .search-container input::placeholder {
            color: #999;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0 0 auto;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-secondary {
            background-color: #ffffff;
            color: #1a1a1a;
            border: 1px solid #d0d0d0;
        }

        .btn-secondary:hover {
            background-color: #f8f8f8;
            border-color: #999;
        }

        .btn-primary {
            background-color: #C6002B;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: #A00020;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Main Article Container */
        .main-content {
            display: flex;
            width: 100%;
            margin: 0;
        }

        /* Sidebar - Collapsed State (default) */
        .sidebar {
            width: 48px;
            background-color: #ffffff;
            border-right: 1px solid #e5e5e5;
            padding: 8px 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: sticky;
            top: 56px;
            max-height: calc(100vh - 56px);
            overflow-y: auto;
            transition: width 0.3s ease;
            cursor: pointer;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 500;
        }

        .sidebar::-webkit-scrollbar {
            display: none;
        }

        .sidebar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .sidebar-item {
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #1a1a1a;
            transition: background-color 0.2s;
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }

        .sidebar-item:hover {
            background-color: #f5f5f5;
        }

        .sidebar-item-icon {
            width: 24px;
            height: 24px;
            background-color: transparent;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #666;
        }

        .sidebar-item-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .sidebar-item span {
            display: none;
        }

        .community-avatar {
            width: 32px;
            height: 32px;
            background-color: #e5e5e5;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .community-avatar:hover {
            background-color: #d0d0d0;
        }

        .community-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar-divider {
            width: 100%;
            height: 1px;
            background-color: #e5e5e5;
            margin: 4px 0;
        }

        .sidebar-section-expanded,
        .sidebar-label,
        .creator-banner,
        .category-item,
        .community-item {
            display: none;
        }

        /* Sidebar - Expanded State */
        .sidebar.expanded {
            width: 240px;
            padding: 3px 0;
            align-items: stretch;
            gap: 0;
        }

        .sidebar.expanded .sidebar-item {
            padding: 8px 12px;
            gap: 6px;
            width: auto;
            height: auto;
            justify-content: flex-start;
            border-radius: 8px;
            margin: 0 12px;
        }

        .sidebar.expanded .sidebar-item span {
            display: inline;
            font-size: 14px;
        }

        .sidebar.expanded .sidebar-divider {
            display: none;
        }

        .sidebar.expanded .sidebar-section-expanded {
            display: block;
            padding: 0;
            margin-bottom: 4px;
        }

        .sidebar.expanded .sidebar-label {
            padding: 3px 10px;
            font-size: 14px;
            font-weight: 700;
            color: #1a1a1a;
            text-transform: none;
            letter-spacing: 0.2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .sidebar-label-chevron {
            width: 16px;
            height: 16px;
            color: #ccc;
            transition: transform 0.2s ease;
        }

        .sidebar-label.collapsed .sidebar-label-chevron {
            transform: rotate(-90deg);
        }

        .sidebar.expanded .creator-banner {
            background-color: #C6002B;
            color: white;
            margin: 6px;
            padding: 8px 6px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }

        .sidebar.expanded .creator-banner:hover {
            background-color: #A00020;
        }

        .sidebar.expanded .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin: 0 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a1a;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .category-item-label {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .category-item-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-item-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .sidebar.expanded .category-item:hover {
            background-color: #f5f5f5;
        }

        .category-chevron {
            width: 12px;
            height: 12px;
            color: #ccc;
            transition: transform 0.2s ease;
        }

        .category-item.open .category-chevron {
            transform: rotate(180deg);
        }

        .sidebar.expanded .category-subitem,
        .sidebar .category-subitem {
            padding: 6px 12px 6px 24px;
            margin: 0 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .sidebar.expanded .category-subitem:hover,
        .sidebar .category-subitem:hover {
            background-color: #f5f5f5;
        }

        .category-subitem-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #e5e5e5;
            flex-shrink: 0;
            overflow: hidden;
        }

        .category-subitem-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar.expanded .community-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            margin: 0 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a1a;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .sidebar.expanded .community-item:hover {
            background-color: #f5f5f5;
        }

        .sidebar.expanded .community-item .community-avatar {
            width: 20px;
            height: 20px;
        }

        /* Hide collapsed-only items when expanded */
        .sidebar.expanded .collapsed-only {
            display: none !important;
        }

        /* Article Content */
        .article-container {
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 60px);
        }

        .article-layout {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .article-main {
            flex: 900;
            min-width: 0;
        }

        .article-side {
            flex: 392;
            min-width: 0;
            aspect-ratio: 392 / 640;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            position: sticky;
            top: 10px;
            align-self: flex-start;
        }

        @media (max-width: 1024px) {
            .article-side {
                display: none;
            }
        }

        .article-wrapper {
            width: 100%;
            margin: 0;
            padding: 40px 32px;
        }

        /* Article Header */
        .article-header {
            margin-bottom: 32px;
        }

        .article-category {
            font-size: 11px;
            font-weight: 700;
            color: #C6002B;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .breadcrumb {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        .article-title {
            font-size: 36px;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e5e5;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .author-avatar {
            width: 48px;
            height: 48px;
            background-color: #e5e5e5;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .author-details {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 600;
            font-size: 13px;
        }

        .author-handle {
            font-size: 12px;
            color: #999;
        }

        .article-date {
            font-size: 12px;
            color: #999;
        }

        .article-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #e5e5e5;
            background-color: white;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            color: #666;
        }

        .action-btn:hover {
            background-color: #f5f5f5;
            color: #C6002B;
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Featured Image */
        .article-featured-image {
            width: 100%;
            aspect-ratio: 900 / 674;
            height: auto;
            background-color: #e5e5e5;
            border-radius: 8px;
            margin-bottom: 0;
            object-fit: cover;
            display: block;
        }

        /* Video Seeker */
        .video-seeker {
            width: 47%;
            height: 3px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 1.5px;
            cursor: pointer;
            overflow: hidden;
            position: absolute;
            bottom: 32px;
            left: 0;
            margin-bottom: 0;
        }

        .seeker-progress {
            width: 35%;
            height: 100%;
            background-color: #ffffff;
            border-radius: 1.5px;
            transition: width 0.1s ease;
        }

        /* Ad Starting In Pill */
        .ad-starting-pill {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: #11111180;
            color: #ffffff;
            padding: 6px 6px 6px 14px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            z-index: 10;
        }

        .ad-starting-text {
            color: #ffffff;
            white-space: nowrap;
        }

        .ad-starting-counter {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            color: #ffffff;
            position: relative;
        }

        .ad-starting-counter svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ad-starting-counter .counter-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.25);
            stroke-width: 1.5;
        }

        .ad-starting-counter .counter-progress {
            fill: none;
            stroke: #ffffff;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-dasharray: 62.83;
            stroke-dashoffset: 15.7;
        }

        .ad-starting-counter span {
            position: relative;
            z-index: 1;
        }

        /* Article Section with Starbucks */
        .article-section {
            width: 100%;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .section-content {
            display: flex;
            gap: 16px;
        }

        .section-text {
            flex: 1;
            font-size: 18px;
            line-height: 1.6;
            color: #1a1a1a;
            font-family: Georgia, 'Iowan Old Style', 'Charter', 'Times New Roman', serif;
        }

        .faded-text {
            background: linear-gradient(to bottom, #1a1a1a 0%, #b0b0b0 60%, #f0f0f0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .section-sidebar {
            flex-shrink: 0;
            width: 280px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-date {
            font-size: 14px;
            color: #1a1a1a;
            font-weight: 700;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
        }

        .section-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .section-action {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #1a1a1a;
            cursor: pointer;
            text-decoration: none;
            background: none;
            border: none;
            padding: 0;
        }

        .section-action-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-card {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 16px;
            text-align: left;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background-color: #f5f5f5;
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
        }

        .brand-info {
            flex: 1;
        }

        .brand-name {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
        }

        .brand-sponsored {
            font-size: 11px;
            color: #999;
        }

        .brand-question {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .brand-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .brand-option {
            padding: 10px 12px;
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            font-size: 13px;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .brand-option:hover {
            background-color: #f5f5f5;
            border-color: #999;
        }

        .section-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding-top: 12px;
        }

        .nav-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background-color: #ddd;
            cursor: pointer;
        }

        .nav-dot.active {
            background-color: #999;
        }

        .nav-arrow {
            width: 18px;
            height: 18px;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-color: #999;
            color: white;
            transition: all 0.2s;
        }

        .nav-arrow:hover {
            background-color: #777;
        }

        .nav-arrow svg {
            width: 8px;
            height: 8px;
            color: white;
        }

        /* Article Body */
        .article-body {
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 32px;
            color: #333;
        }

        .article-body p {
            margin-bottom: 16px;
        }

        .article-body h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 32px 0 16px;
        }

        .article-body h3 {
            font-size: 20px;
            font-weight: 600;
            margin: 24px 0 12px;
        }

        .article-body strong {
            font-weight: 600;
        }

        .article-body em {
            font-style: italic;
            color: #666;
        }

        .article-body a {
            color: #0645ff;
            text-decoration: none;
            border-bottom: 1px solid #0645ff;
        }

        .article-body a:hover {
            color: #0535d9;
        }

        .article-body blockquote {
            border-left: 4px solid #C6002B;
            padding-left: 16px;
            margin: 20px 0;
            color: #666;
            font-style: italic;
        }

        .article-body ul,
        .article-body ol {
            margin: 16px 0 16px 24px;
        }

        .article-body li {
            margin-bottom: 8px;
        }

        /* Article Interactions */
        .article-footer {
            border-top: 1px solid #e5e5e5;
            border-bottom: 1px solid #e5e5e5;
            padding: 24px 0;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .share-buttons {
            display: flex;
            gap: 12px;
        }

        .share-btn {
            width: 40px;
            height: 40px;
            border: 1px solid #e5e5e5;
            background-color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
            color: #666;
        }

        .share-btn:hover {
            background-color: #f5f5f5;
            border-color: #0645ff;
            color: #0645ff;
        }

        .share-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Related Articles */
        .related-section {
            margin-bottom: 40px;
        }

        .related-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .related-articles {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .related-card {
            background-color: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .related-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .related-image {
            width: 100%;
            height: 120px;
            background-color: #ddd;
        }

        .related-content {
            padding: 12px;
        }

        .related-category {
            font-size: 10px;
            font-weight: 700;
            color: #C6002B;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .related-title-text {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .related-meta {
            font-size: 11px;
            color: #999;
        }

        /* Comments Section */
        .comments-section {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid #e5e5e5;
        }

        .comments-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .comment-input {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .comment-avatar {
            width: 40px;
            height: 40px;
            background-color: #e5e5e5;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .comment-input-wrapper {
            flex: 1;
        }

        .comment-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
            min-height: 80px;
        }

        .comment-textarea:focus {
            outline: none;
            border-color: #0645ff;
            box-shadow: 0 0 0 2px rgba(6, 69, 255, 0.1);
        }

        .comment-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .comment {
            display: flex;
            gap: 12px;
        }

        .comment-author-avatar {
            width: 36px;
            height: 36px;
            background-color: #e5e5e5;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .comment-body {
            flex: 1;
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .comment-author-name {
            font-weight: 600;
            font-size: 13px;
        }

        .comment-timestamp {
            font-size: 12px;
            color: #999;
        }

        .comment-text {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }

        .comment-actions-small {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            font-size: 12px;
        }

        .comment-action-link {
            color: #0645ff;
            cursor: pointer;
            text-decoration: none;
        }

        .comment-action-link:hover {
            text-decoration: underline;
        }

        /* Scrollbar - Hidden */
        .article-container::-webkit-scrollbar {
            display: none;
        }

        .article-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Tablet */
        @media (max-width: 1024px) {
            .article-wrapper {
                padding: 32px 24px;
            }

            .article-section {
                width: 100%;
            }

            .section-content {
                flex-direction: column;
            }

            .section-sidebar {
                width: 100%;
            }

            .search-container {
                min-width: 140px;
            }
        }

        /* Mobile */
        @media (max-width: 640px) {
            .header {
                padding: 0 12px;
                gap: 8px;
            }

            .hamburger-btn {
                display: flex;
            }

            .header-center {
                display: none;
            }

            .header-right {
                gap: 6px;
            }

            .header-right .btn {
                padding: 6px 10px;
                font-size: 11px;
                height: 30px;
            }

            .logo-text {
                height: 14px;
            }

            .search-container {
                min-width: 0;
                flex: 0 0 36px;
                height: 32px;
                padding: 0;
                gap: 0;
                justify-content: center;
                cursor: pointer;
                overflow: hidden;
                transition: flex-basis 0.3s ease, flex-grow 0.3s ease, padding 0.3s ease, gap 0.3s ease;
            }

            .search-container input {
                opacity: 0;
                width: 0;
                min-width: 0;
                padding: 0;
                font-size: 12px;
                transition: opacity 0.25s ease 0.1s, width 0.3s ease;
            }

            .header-right .btn {
                max-width: 200px;
                overflow: hidden;
                transition: opacity 0.2s ease, max-width 0.3s ease, padding 0.3s ease, border-width 0.3s ease;
            }

            .header-right.search-active .search-container {
                flex: 1 1 0;
                padding: 5px 10px;
                gap: 6px;
                justify-content: flex-start;
            }

            .header-right.search-active .search-container input {
                opacity: 1;
                width: 100%;
                flex: 1;
            }

            .header-right.search-active .btn {
                opacity: 0;
                max-width: 0;
                padding-left: 0;
                padding-right: 0;
                border-width: 0;
                pointer-events: none;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 260px !important;
                height: 100vh;
                max-height: none;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 200;
                box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
                padding: 3px 0;
                align-items: stretch;
                gap: 0;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar .sidebar-item {
                padding: 8px 12px;
                gap: 6px;
                width: auto;
                height: auto;
                justify-content: flex-start;
                border-radius: 8px;
                margin: 0 12px;
            }

            .sidebar .sidebar-item span {
                display: inline;
                font-size: 12px;
            }

            .sidebar .sidebar-divider {
                display: none;
            }

            .sidebar .sidebar-section-expanded {
                display: block;
                padding: 0;
                margin-bottom: 4px;
            }

            .sidebar .sidebar-label {
                padding: 3px 10px;
                font-size: 14px;
                font-weight: 700;
                color: #1a1a1a;
                text-transform: none;
                letter-spacing: 0.2px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .sidebar .creator-banner {
                background-color: #C6002B;
                color: white;
                margin: 6px;
                padding: 8px 6px;
                border-radius: 6px;
                font-size: 9px;
                font-weight: 600;
                text-align: center;
                display: block;
            }

            .sidebar .category-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 12px;
                margin: 0 12px;
                border-radius: 8px;
                font-size: 12px;
            }

            .sidebar .community-item {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 8px 12px;
                margin: 0 12px;
                border-radius: 8px;
                font-size: 12px;
            }

            .sidebar .collapsed-only {
                display: none !important;
            }

            .article-wrapper {
                padding: 20px 16px;
            }

            .article-title {
                font-size: 24px;
            }

            .article-meta {
                flex-wrap: wrap;
                gap: 12px;
            }

            .article-actions {
                margin-left: 0;
            }

            .article-body {
                font-size: 15px;
            }

            .article-body h2 {
                font-size: 20px;
            }

            .article-body h3 {
                font-size: 18px;
            }

            .section-text {
                font-size: 16px;
            }

            .article-footer {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .related-articles {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header" id="header"></header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar (Collapsible) -->
            <aside class="sidebar" id="sidebar"></aside>

            <!-- Article Container -->
            <article class="article-container">
                <div class="article-wrapper" id="article-content"></div>
            </article>
        </div>
    </div>

    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <script src="article.js"></script>
</body>
</html>
