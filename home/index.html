<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHeartVIP - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.5;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
            flex-shrink: 0;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 0 0 auto;
        }

        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            color: #1a1a1a;
            align-items: center;
            justify-content: center;
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 150;
        }

        .sidebar-backdrop.visible {
            display: block;
        }

        .logo {
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            color: #1a1a1a;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            height: 18px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .header-title-image {
            height: 24px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .header-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0px;
            white-space: nowrap;
            color: #1a1a1a;
            height: 31px;
            display: flex;
            align-items: center;
        }

        .header-title .subtle {
            font-weight: 400;
            color: #666;
        }

        .search-container {
            display: flex;
            align-items: center;
            background-color: #f5f5f5;
            border-radius: 20px;
            padding: 8px 14px;
            gap: 8px;
            min-width: 320px;
        }

        .search-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .search-container input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 13px;
            outline: none;
            color: #1a1a1a;
        }

        .search-container input::placeholder {
            color: #999;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0 0 auto;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-secondary {
            background-color: #ffffff;
            color: #1a1a1a;
            border: 1px solid #d0d0d0;
        }

        .btn-secondary:hover {
            background-color: #f8f8f8;
            border-color: #999;
        }

        .btn-primary {
            background-color: #C6002B;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: #A00020;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background-color: #ffffff;
            border-right: 1px solid #e5e5e5;
            overflow-y: auto;
            padding: 3px 0;
        }

        .sidebar-section {
            padding: 0;
            margin-bottom: 4px;
        }

        .sidebar-item {
            padding: 8px 12px;
            margin: 0 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #1a1a1a;
            transition: background-color 0.2s;
        }

        .sidebar-item:hover {
            background-color: #f5f5f5;
        }

        .sidebar-item-icon {
            width: 20px;
            height: 20px;
            background-color: transparent;
            border-radius: 4px;
            color: #666;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-item-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .sidebar-label {
            padding: 3px 10px;
            font-size: 8px;
            font-weight: 600;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-label-chevron {
            width: 16px;
            height: 16px;
            color: #ccc;
        }

        .creator-banner {
            background-color: #C6002B;
            color: white;
            margin: 6px;
            padding: 8px 6px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .creator-banner:hover {
            background-color: #A00020;
        }

        .category-item {
            padding: 8px 12px;
            margin: 0 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: #1a1a1a;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .category-item:hover {
            background-color: #f5f5f5;
        }

        .category-chevron {
            width: 16px;
            height: 16px;
            color: #ccc;
        }

        .community-item {
            padding: 8px 12px;
            margin: 0 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #1a1a1a;
            transition: background-color 0.2s;
        }

        .community-item:hover {
            background-color: #f5f5f5;
        }

        .community-avatar {
            width: 24px;
            height: 24px;
            background-color: #e5e5e5;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .community-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            background-color: #ffffff;
        }

        .content-section {
            border-bottom: 1px solid #e5e5e5;
        }

        .section-header {
            padding: 20px 24px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
        }

        .section-subtitle {
            font-size: 13px;
            color: #0645ff;
            font-weight: 600;
            cursor: pointer;
        }

        /* Featured Section Container */
        .featured-container {
            display: flex;
            gap: 24px;
            padding: 24px;
        }

        .featured-left {
            flex: 1;
        }

        .featured-right {
            flex: 1;
        }

        /* Greeting Section */
        .greeting {
            padding: 0 0 20px 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
        }

        .greeting-text {
            font-size: 24px;
            font-weight: 700;
        }

        .briefing-badge {
            background-color: #CDDAFF;
            color: #0645ff;
            padding: 4px 4px 4px 8px;
            border-radius: 16px;
            border-top: 1px solid rgba(244, 245, 246, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 12px;
            font-weight: 600;
            height: 32px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .briefing-badge::before {
            content: '5';
            background-color: #0645ff;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Video Carousel */
        .carousel {
            padding: 0;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-behavior: smooth;
        }

        .carousel-item {
            min-width: 120px;
            height: 200px;
            background: linear-gradient(to bottom, #666, #333);
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .carousel-item::after {
            content: '▶';
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Exclusive Section */
        .exclusive-section {
            background-color: #ffffff;
        }

        .exclusive-header {
            margin-bottom: 16px;
        }

        .exclusive-badge {
            font-size: 10px;
            font-weight: 700;
            color: white;
            background-color: #0645ff;
            padding: 4px 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-bottom: 8px;
        }

        /* Article Cards */
        .article-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0;
        }

        .article-card {
            background-color: transparent;
            border-radius: 0;
            overflow: visible;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            gap: 16px;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 16px;
        }

        .article-card:last-child {
            border-bottom: none;
        }

        .article-card:hover {
            transform: translateY(-2px);
        }

        .article-image {
            width: 80px;
            height: 60px;
            background-color: #2c2c2c;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .article-content {
            padding: 0;
            flex: 1;
        }

        .article-badge {
            font-size: 10px;
            font-weight: 700;
            color: white;
            background-color: #0645ff;
            padding: 4px 8px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: inline-block;
        }

        .article-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
            color: #1a1a1a;
        }

        .article-meta {
            font-size: 11px;
            color: #999;
        }

        /* Brand Section */
        .brands-container {
            padding: 20px 24px;
        }

        .brands-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .brand-card {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 16px;
            text-align: left;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background-color: #f5f5f5;
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
        }

        .brand-info {
            flex: 1;
        }

        .brand-name {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
        }

        .brand-sponsored {
            font-size: 11px;
            color: #999;
        }

        .brand-question {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .brand-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .brand-option {
            padding: 10px 12px;
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            font-size: 13px;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .brand-option:hover {
            background-color: #f5f5f5;
            border-color: #999;
        }

        /* Featured Section */
        .featured-section {
            padding: 20px 24px;
        }

        .featured-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .featured-card {
            background-color: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
            padding: 16px;
        }

        .featured-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .featured-avatar {
            width: 48px;
            height: 48px;
            background-color: #ddd;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .featured-info {
            flex: 1;
        }

        .featured-author {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .featured-badge {
            display: inline-block;
            background-color: #C6002B;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }

        .featured-description {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            margin-top: 8px;
        }

        /* Input Area */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #e5e5e5;
            background-color: #ffffff;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-icon {
            width: 44px;
            height: 44px;
            background-color: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: #666;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .input-icon:hover {
            background-color: #eeeeee;
            color: #0645ff;
        }

        .input-icon svg {
            width: 20px;
            height: 20px;
        }

        .input-field {
            flex: 1;
            background-color: #f5f5f5;
            border: none;
            border-radius: 4px;
            padding: 12px 16px;
            font-size: 13px;
            outline: none;
        }

        .input-field:focus {
            background-color: #eeeeee;
        }

        /* Scrollbar - Hidden */
        .content::-webkit-scrollbar,
        .sidebar::-webkit-scrollbar,
        .carousel::-webkit-scrollbar {
            display: none;
        }

        .content,
        .sidebar,
        .carousel {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Tablet */
        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }

            .featured-container {
                flex-direction: column;
                gap: 16px;
                padding: 20px;
            }

            .brands-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .featured-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .search-container {
                min-width: 140px;
            }

            .lastsection-grid {
                flex-direction: column !important;
                gap: 20px !important;
                padding: 20px !important;
            }

            .lastsection-col {
                width: 100%;
                min-width: 0;
            }

            .promptvideo-section {
                height: auto !important;
            }

            .promptvideo-grid {
                flex-direction: column !important;
                height: auto !important;
            }

            .promptvideo-col {
                width: 100%;
                min-width: 0;
            }
        }

        /* Mobile */
        @media (max-width: 640px) {
            .header {
                padding: 0 12px;
                gap: 8px;
            }

            .hamburger-btn {
                display: flex;
            }

            .header-center {
                display: none;
            }

            .header-right {
                gap: 6px;
            }

            .header-right .btn {
                padding: 6px 10px;
                font-size: 11px;
                height: 30px;
            }

            .logo-text {
                height: 14px;
            }

            .search-container {
                min-width: 0;
                flex: 1;
                padding: 5px 8px;
                gap: 6px;
            }

            .search-container input {
                font-size: 12px;
                min-width: 0;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 260px;
                height: 100vh;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 200;
                box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .featured-container {
                flex-direction: column;
                gap: 16px;
                padding: 16px;
            }

            .greeting {
                gap: 8px;
                padding-bottom: 16px;
                flex-wrap: wrap;
            }

            .greeting-text {
                font-size: 20px;
            }

            .section-header {
                padding: 16px 16px 12px;
            }

            .section-title {
                font-size: 16px;
            }

            .brands-container,
            .featured-section {
                padding: 16px;
            }

            .brands-grid {
                grid-template-columns: 1fr;
            }

            .featured-grid {
                grid-template-columns: 1fr;
            }

            .carousel-item {
                min-width: 100px;
                height: 160px;
            }

            .input-area {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header" id="header"></header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar"></aside>

            <!-- Content -->
            <main class="content" id="content"></main>
        </div>
    </div>

    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <script src="app.js"></script>
</body>
</html>
